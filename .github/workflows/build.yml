name: Build & Release

on:
  push:
    branches: [main, 'claude/**']
    tags:     ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.0) — leave blank for artifact-only build'
        required: false
        default: ''

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
            rust-targets: ''

    permissions:
      contents: write

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Use pre-26 Xcode if available (keeps pre-Tahoe window chrome)
        if: matrix.platform == 'macos-latest'
        run: |
          XCODE=$(ls -d /Applications/Xcode_1[5-6]* 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE" ]; then sudo xcode-select -s "$XCODE"; fi
          xcodebuild -version

      - name: Install frontend deps
        run: npm install

      - name: Build Tauri app (branch)
        if: ${{ !startsWith(github.ref, 'refs/tags/') && inputs.tag == '' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Upload installers (branch build)
        if: ${{ !startsWith(github.ref, 'refs/tags/') && inputs.tag == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}
          path: |
            src-tauri/target/**/bundle/dmg/*.dmg
            src-tauri/target/**/bundle/nsis/*.exe
            src-tauri/target/**/bundle/msi/*.msi
          if-no-files-found: error

      - name: Build Tauri app (release)
        if: ${{ startsWith(github.ref, 'refs/tags/') || inputs.tag != '' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName:     ${{ inputs.tag || github.ref_name }}
          releaseName: 'iMac Monitor Control ${{ inputs.tag || github.ref_name }}'
          releaseBody: |
            ## Downloads
            - **macOS**: `iMac Monitor Control_*_universal.dmg` — works on both Intel and Apple Silicon
            - **Windows**: `iMac Monitor Control_*_x64-setup.exe` or `iMac Monitor Control_*_x64_en-US.msi`

            ## Install
            - **Mac**: Open the `.dmg`, drag to Applications
            - **Windows**: Run the `.exe` or `.msi` installer
          releaseDraft: false
          prerelease:   false
          args:         ${{ matrix.args }}
